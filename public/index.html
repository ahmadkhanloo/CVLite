<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CVLite Resume Builder</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="stylesheet" href="/print.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">CVLite</p>
      <h1>رزومه‌ساز محلی</h1>
    </div>
    <div class="topbar-actions">
      <label class="icon-button" title="Import JSON or Markdown">
        <span>Import</span>
        <input id="file-input" type="file" accept=".json,.md,.markdown,application/json,text/markdown,text/plain">
      </label>
      <button id="export-json" class="icon-button" type="button">JSON</button>
      <button id="export-md" class="icon-button" type="button">MD</button>
      <button id="download-pdf" class="primary-button" type="button">دانلود PDF</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="control-panel">
      <section class="panel-section">
        <h2>قالب خروجی</h2>
        <div id="template-tabs" class="segmented"></div>
        <label class="field compact-field">
          <span>اندازه صفحه</span>
          <select id="page-size">
            <option value="A4">A4</option>
            <option value="Letter">Letter</option>
          </select>
        </label>
      </section>

      <section class="panel-section">
        <h2>اطلاعات اصلی</h2>
        <div id="basics-editor"></div>
      </section>

      <section class="panel-section">
        <h2>بخش‌ها</h2>
        <div id="sections-editor"></div>
      </section>
    </aside>

    <section class="preview-panel">
      <div class="preview-toolbar">
        <div>
          <p class="eyebrow">Preview</p>
          <h2 id="preview-title">رزومه</h2>
        </div>
        <div id="status" class="status">ذخیره شد</div>
      </div>
      <div id="preview" class="preview-frame" dir="ltr"></div>
    </section>
  </main>

  <script src="/resume-core.js"></script>
  <script src="/app.js"></script>
</body>
</html>
